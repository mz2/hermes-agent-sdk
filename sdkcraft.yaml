name: hermes-agent
adopt-info: hermes-agent
summary: Hermes Agent — self-improving AI agent from Nous Research
description: |
  This SDK provides the Hermes Agent (https://github.com/NousResearch/hermes-agent),
  a self-improving AI agent that creates skills from experience, maintains
  persistent memory, and bridges to messaging platforms (Telegram, Discord,
  Slack, Signal, Email) via its gateway daemon.

  Hermes ships with a pre-built Python virtual environment inside the SDK.
  Config and state (~/.hermes) and secrets (.env) persist via the hermes-home mount plug.
  The gateway runs as a systemd user unit; the LLM backend is consumed
  through the llm-backend tunnel plug (Ollama-compatible by default).

license: MIT
website: https://github.com/canonical/hermes-agent-sdk

platforms:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:
  ubuntu@26.04:amd64:
  ubuntu@26.04:arm64:

plugs:
  # The Hermes agent home — config.yaml, .env (symlink), SOUL.md, persistent
  # memory, skills, and sessions. ONLY the agent's config and state; the SDK's
  # pre-built runtime lives under /var/lib/workshop/sdk/hermes-agent. Like
  # claude-code's `claude-config`, this mount auto-connects to
  # Workshop-allocated storage and survives `workshop refresh`. To manage the
  # directory on the host instead: `workshop stop <ws>` then
  # `workshop remount <ws>/hermes-agent:hermes-home <host-path>` then
  # `workshop start <ws>`.
  hermes-home:
    interface: mount
    workshop-target: /home/workshop/.hermes
    mode: 0o700

  # LLM backend tunnel — wire to an Ollama workshop or host port. Default
  # config.yaml points at http://localhost:11434/v1, so connecting this plug
  # to an Ollama-compatible OpenAI endpoint on port 11434 makes the agent
  # work out of the box.
  llm-backend:
    interface: tunnel
    endpoint: 11434

  # Memory backend tunnel — wire to an external memory service (e.g. a mem0
  # or hindsight SDK in a sibling workshop, or a host endpoint) instead of
  # the built-in markdown memory. Connect this plug to that SDK's tunnel
  # slot; inside the workshop the service is then reachable at
  # http://localhost:8000, which is what the agent's memory backend config
  # should point at. Adjust `endpoint` to match the memory service's port.
  memory-backend:
    interface: tunnel
    endpoint: 8000

slots:
  # Gateway tunnel slot. Hermes' gateway is primarily an outbound consumer
  # of messaging APIs, but exposing its loopback presence at port 8765 lets
  # the host probe `hermes gateway status`-style endpoints if/when upstream
  # exposes one. Keep the slot even if unused today — it's the only way to
  # let host tooling reach into the workshop.
  gateway:
    interface: tunnel
    endpoint: 8765

parts:
  # Build a relocatable Python venv from the upstream release using uv.
  # uv sync --frozen reads uv.lock from the release tarball, pinning every
  # transitive dependency to exact SHA256 hashes.
  hermes-agent:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    build-environment:
      - UV_NO_EDITABLE: "1"
    build-packages:
      - curl
      - ca-certificates
      - git
      - gcc
      - g++
      - make
      - python3-dev
      - libffi-dev
      - libolm-dev
    uv-extras:
      - messaging
      - web
      - cron
    override-pull: |
      # VERSION is the GitHub release tag (date-based, e.g. 2026.6.19).
      # The PyPI package version (e.g. 0.17.0) lives inside pyproject.toml.
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      craftctl set version="$VERSION"
      curl -fsSL -o hermes.tar.gz \
        "https://github.com/NousResearch/hermes-agent/archive/refs/tags/v${VERSION}.tar.gz"
      tar -xzf hermes.tar.gz --strip-components=1 -C "$CRAFT_PART_SRC"
      rm hermes.tar.gz
    override-build: |
      craftctl default
      SYSPYTHON=$(realpath /usr/bin/python3)
      PYVER=$(basename "$SYSPYTHON")
      ln -f -s "$SYSPYTHON" "$CRAFT_PART_INSTALL/bin/$PYVER"
      ln -f -s "$SYSPYTHON" "$CRAFT_PART_INSTALL/bin/python3"
      ln -f -s "$SYSPYTHON" "$CRAFT_PART_INSTALL/bin/python"

  services:
    plugin: dump
    source: services
    source-type: local
