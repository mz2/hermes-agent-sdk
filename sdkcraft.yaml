name: hermes-agent
adopt-info: hermes-agent
summary: Hermes Agent — self-improving AI agent from Nous Research
description: |
  This SDK provides the Hermes Agent (https://github.com/NousResearch/hermes-agent),
  a self-improving AI agent that creates skills from experience, maintains
  persistent memory, and bridges to messaging platforms (Telegram, Discord,
  WhatsApp, Slack, Signal, Email) via its gateway daemon.

  The rebuildable runtime (the hermes-agent clone, the Python venv, bundled
  Node 22, and the uv/npm/Playwright caches) lives inside the workshop
  sandbox — it persists across `workshop refresh` and is rebuilt only on a
  full recreate. Only the agent's config and state (`~/.hermes`: config.yaml,
  memory, skills, sessions) and its secrets (`.env`) are persisted via mount
  plugs, like claude-code's config mount. The gateway runs as a systemd user
  unit and is exposed via the `gateway` tunnel slot for host-side health
  probes. The LLM backend (Ollama-compatible by default) is consumed through
  the `llm-backend` tunnel plug.

  Configure messaging credentials in `~/.hermes/.env` after launch — the
  health check reports `waiting` until the gateway successfully connects.

  Example workshop.yaml — wire the agent to an Ollama-compatible endpoint
  on the host (the `system` SDK exposes the host port as a tunnel slot):

    name: hermes
    base: ubuntu@24.04

    sdks:
      - name: hermes-agent
        channel: latest/stable
      - name: system
        slots:
          llm-backend:
            interface: tunnel
            endpoint: localhost:11434   # Ollama / vLLM / LiteLLM on the host

    connections:
      - plug: hermes-agent:llm-backend
        slot: system:llm-backend

    actions:
      chat: hermes chat "$@"

  Launch, then connect the LLM tunnel once (tunnels do not auto-connect):

    workshop launch
    workshop connect hermes/hermes-agent:llm-backend \
                     hermes/system:llm-backend
    workshop run hermes chat

  To use a remote provider (OpenAI / Anthropic / OpenRouter) instead of a
  host-local Ollama, there is no tunnel to wire — the workshop reaches HTTPS
  providers over its normal outbound network. Use a plain workshop.yaml with
  just `- name: hermes-agent` (no `system` slot, no `connections:`), then in
  ~/.hermes/config.yaml set the model block to the provider's endpoint, e.g.:

    model:
      provider: custom
      default: anthropic/claude-3.5-sonnet    # a model the provider offers
      base_url: https://openrouter.ai/api/v1  # the provider's /v1 endpoint
      api_key: ${OPENROUTER_API_KEY}

  and add the key to ~/.hermes/secrets/.env (e.g.
  `OPENROUTER_API_KEY=sk-or-...`), then `systemctl --user restart
  hermes-gateway`.

license: GPL-3.0-only

build-base: ubuntu@24.04
# Both platforms list both arches under build-on. Parts are plugin: nil so
# sdkcraft pack just bundles metadata + hooks + services with no arch-specific
# build work — any runner can cross-pack any platform. setup-project picks the
# right Node 22 tarball at runtime via dpkg --print-architecture.
platforms:
  amd64:
    build-on: [amd64, arm64]
    build-for: [amd64]
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

plugs:
  # The Hermes agent home — config.yaml, .env (symlink), SOUL.md, persistent
  # memory, skills, and sessions. ONLY the agent's config and state; the
  # rebuildable runtime (the hermes-agent clone, the Python venv, bundled
  # Node 22, and the uv/npm/Playwright caches) deliberately lives inside the
  # workshop sandbox, NOT here — see hooks/setup-project. Like claude-code's
  # `claude-config`, this mount auto-connects to Workshop-allocated storage
  # and survives `workshop refresh`. To manage the directory on the host
  # instead: `workshop stop <ws>` then
  # `workshop remount <ws>/hermes-agent:hermes-home <host-path>` then
  # `workshop start <ws>`.
  hermes-home:
    interface: mount
    workshop-target: /home/workshop/.hermes
    mode: 0o700

  # Secrets directory — a separate, narrower mount so the host can manage just
  # the `.env` file (agenix/sops/plain-file) without owning the rest of the
  # ~/.hermes state tree. Default: Workshop auto-allocates storage and the user
  # enters credentials with `workshop shell`. Override:
  # `workshop remount <ws>/hermes-agent:hermes-secrets <host-path>` to point at a
  # host-managed directory containing `.env`. setup-project symlinks
  # ~/.hermes/.env -> secrets/.env so the gateway unit and the hermes CLI find
  # the same file.
  hermes-secrets:
    interface: mount
    workshop-target: /home/workshop/.hermes/secrets
    mode: 0o700

  # LLM backend tunnel — wire to an Ollama workshop or host port. Default
  # config.yaml points at http://localhost:11434/v1, so connecting this plug
  # to an Ollama-compatible OpenAI endpoint on port 11434 makes the agent
  # work out of the box.
  llm-backend:
    interface: tunnel
    endpoint: 11434

slots:
  # Gateway tunnel slot. Hermes' gateway is primarily an outbound consumer
  # of messaging APIs, but exposing its loopback presence at port 8765 lets
  # the host probe `hermes gateway status`-style endpoints if/when upstream
  # exposes one. Keep the slot even if unused today — it's the only way to
  # let host tooling reach into the workshop.
  gateway:
    interface: tunnel
    endpoint: 8765

parts:
  # Version-only part. The real install (clone + uv pip install + node + playwright
  # + npm) happens in hooks/setup-project because (a) the upstream installer needs
  # internet at runtime, (b) the runtime is built into the workshop sandbox at
  # launch (not shippable in the package), and (c) the install pattern matches
  # JupyterLab (Python source, dynamic install).
  hermes-agent:
    plugin: nil
    override-pull: |
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      craftctl set version="$VERSION"
    # Ship the VERSION file into the SDK payload (lands at $SDK/VERSION,
    # same root as the dumped hermes-gateway.service). setup-project reads
    # it at runtime to pin the hermes-agent clone/checkout.
    override-build: |
      craftctl default
      install -D -m 644 "$CRAFT_PROJECT_DIR/VERSION" "$CRAFT_PART_INSTALL/VERSION"

  # Bundled systemd unit file. Dumped into the SDK so setup-project can install
  # it under ~/.config/systemd/user/.
  services:
    plugin: dump
    source: services
    source-type: local
