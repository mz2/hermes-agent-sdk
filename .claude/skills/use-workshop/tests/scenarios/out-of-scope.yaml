- description: User asks about publishing an SDK to the Store
  vars:
    user: |
      I want to publish my own SDK to the SDK Store so others can use it. How do I do that?
  assert:
    - type: contains
      value: sdkcraft
    - type: contains-any
      value:
        - "out of scope"
        - "outside"
        - "this skill does not"
        - "not covered"
        - "doesn't cover"
        - "does not cover"
        - "separate domain"
        - "different tool"
        - "see the docs"
        - "refer to"
    - type: contains-any
      value:
        - tutorial
        - reference
        - docs
    - type: llm-rubric
      value: |
        The response defers SDK authoring/publishing to the docs and does
        not improvise concrete `sdkcraft` invocations. Pointing the user to
        documentation pages is required. The response MAY also offer help
        on legitimately in-scope adjacent topics (e.g., authoring an
        in-project SDK at `.workshop/<name>/` for tooling that doesn't
        need to live in the Store) as long as such offers are clearly
        distinct from the out-of-scope publishing topic.

- description: User asks about workshopctl
  vars:
    user: |
      What is workshopctl and when do I use it?
  assert:
    - type: contains
      value: workshopctl
    - type: contains-any
      value:
        - "out of scope"
        - "this skill does not"
        - "not covered"
        - "in-workshop"
        - "inside the workshop"
        - "SDK hook"
        - health
    - type: llm-rubric
      value: |
        The response identifies `workshopctl` as the in-workshop
        health-reporting tool used by SDK hooks, treats operating it as
        out of scope for this skill (the user is told they shouldn't / won't
        normally call it), and points to the docs. The response MAY include
        an illustrative example showing how an SDK author would call
        `workshopctl` from a hook, provided the example is clearly bracketed
        as "SDK author perspective, not yours" or equivalent — that's
        explanatory framing, not improvisation.

- description: User asks about sdkcraft pack vs workshop launch
  vars:
    user: |
      What's the difference between sdkcraft pack and workshop launch?
  assert:
    - type: contains-any
      value:
        - "out of scope"
        - "this skill does not"
        - "not covered"
        - "doesn't cover"
        - sdkcraft is for
        - "publishing"
        - "authoring"
    - type: contains
      value: workshop launch
    - type: not-contains
      value: sdkcraft pack <

- description: User asks the agent to drive a workshop sketch-sdk session
  vars:
    user: |
      Walk me through using `workshop sketch-sdk` on my workshop — open the editor, drop in a few package installs, and save it.
  assert:
    - type: contains
      value: sketch-sdk
    - type: contains-any
      value:
        - "interactive"
        - "$EDITOR"
        - "out of scope"
        - "this skill does not"
        - "not covered"
        - "doesn't cover"
        - "vocabulary"
    - type: contains-any
      value:
        - in-project SDK
        - author-in-project-sdk
        - ".workshop/"
    - type: llm-rubric
      value: |
        The response acknowledges `workshop sketch-sdk` as Workshop
        vocabulary but explains that this skill does not drive the
        interactive sketch flow (it requires an `$EDITOR` session). It
        redirects the user to authoring an in-project SDK directly under
        `.workshop/<name>/` (sdk.yaml + executable hook scripts) as the
        committable, agent-drivable path to ship a custom SDK. It does
        NOT improvise a concrete sequence of `workshop sketch-sdk`
        invocations.
