# Example workshop: Hermes Agent + an MCP server (affine-mcp-server).
#
# This pairs the hermes-agent SDK with the affine-mcp-server SDK in ONE
# workshop and wires Hermes' `mcp-server` tunnel plug to the AFFiNE server's
# `affine-mcp-http` slot. Hermes then discovers the AFFiNE tools (read/author
# docs) via the `mcp_servers:` block in ~/.hermes/config.yaml.
#
# This is a reference file; it is NOT auto-loaded (its name isn't
# `workshop.yaml`). Copy it into a project as `workshop.yaml` to use it.
#
# Transport choice: this example uses the AFFiNE server's HTTP transport
# (port 3000) rather than stdio. HTTP works for the long-running gateway
# daemon and across workshops, and avoids the PATH caveats of stdio under a
# systemd user unit. For the stdio (same-workshop subprocess) alternative,
# see the README "MCP servers" section.
#
# Quickstart once launched (workshop name is `hermes`):
#   workshop launch --verbose
#   # one-time: authenticate the AFFiNE server (or use AFFINE_* env vars)
#   workshop run hermes affine-login
#   # start the AFFiNE MCP server over HTTP (transient systemd user unit)
#   workshop run hermes affine-serve -- your-strong-secret
#   # tell Hermes about it, then chat
#   workshop run hermes enable-affine -- your-strong-secret
#   workshop run hermes chat

name: hermes
base: ubuntu@24.04

sdks:
  - name: hermes-agent
    channel: latest/stable
    # For local SDK development, swap to the try build instead:
    # name: try-hermes-agent  (no channel)

  - name: affine-mcp-server
    channel: latest/stable

  # The LLM backend on the host (Ollama-compatible). Drop this block and the
  # llm-backend connection below to use a remote provider instead — see
  # examples/workshop.remote-openai.yaml.
  - name: system
    slots:
      llm-backend:
        interface: tunnel
        endpoint: localhost:11434

connections:
  # Wire Hermes' outbound LLM plug to the host Ollama (see examples/workshop.yaml).
  - plug: hermes-agent:llm-backend
    slot: system:llm-backend

  # Wire Hermes' MCP plug to the AFFiNE server's HTTP slot. Both SDKs live in
  # this one workshop, so once the AFFiNE server is serving HTTP on port 3000
  # (the `affine-serve` action below), it is reachable inside the workshop at
  # http://localhost:3000/mcp — which is what `enable-affine` writes into
  # ~/.hermes/config.yaml. Note the plug is referenced by the SDK's real name
  # `hermes-agent`, not `try-hermes-agent` (`try-` is reserved in refs).
  - plug: hermes-agent:mcp-server
    slot: affine-mcp-server:affine-mcp-http

actions:
  # One-time: authenticate the AFFiNE MCP server. Credentials persist in the
  # affine-mcp-config mount. Alternatively set AFFINE_BASE_URL / AFFINE_API_TOKEN
  # in the environment before `affine-serve`.
  affine-login: |
    affine-mcp login
    affine-mcp status

  # Start the AFFiNE MCP server over HTTP as a transient systemd user unit so
  # it keeps running after this one-shot action returns. Pass the bearer token
  # Hermes will present; it is also stored in ~/.hermes/secrets/.env so
  # enable-affine can reference it. Re-run to restart with a new token.
  #   workshop run hermes affine-serve -- your-strong-secret
  affine-serve: |
    token="$1"
    if [ -z "$token" ]; then echo "usage: affine-serve <bearer-token>" >&2; exit 1; fi
    sed -i '/^AFFINE_MCP_HTTP_TOKEN=/d' ~/.hermes/secrets/.env 2>/dev/null || true
    printf 'AFFINE_MCP_HTTP_TOKEN=%s\n' "$token" >> ~/.hermes/secrets/.env
    systemctl --user reset-failed affine-mcp-http.service 2>/dev/null || true
    systemd-run --user --unit=affine-mcp-http --collect \
      --setenv=MCP_TRANSPORT=http \
      --setenv=AFFINE_MCP_AUTH_MODE=bearer \
      --setenv=AFFINE_MCP_HTTP_TOKEN="$token" \
      affine-mcp
    echo "AFFiNE MCP server listening on http://localhost:3000/mcp"
    echo "Check it: systemctl --user status affine-mcp-http"

  # Add (or replace) the `affine` entry in ~/.hermes/config.yaml's mcp_servers
  # block, pointing at the local HTTP transport with the bearer token, then
  # restart the gateway so Hermes rediscovers the tools.
  #   workshop run hermes enable-affine -- your-strong-secret
  enable-affine: |
    token="$1"
    if [ -z "$token" ]; then echo "usage: enable-affine <bearer-token>" >&2; exit 1; fi
    ~/hermes-agent/venv/bin/python - "$token" <<'PY'
    import sys, yaml, pathlib
    token = sys.argv[1]
    cfg_path = pathlib.Path.home() / ".hermes" / "config.yaml"
    cfg = yaml.safe_load(cfg_path.read_text()) or {}
    servers = cfg.setdefault("mcp_servers", {})
    servers["affine"] = {
        "url": "http://localhost:3000/mcp",
        "headers": {"Authorization": f"Bearer {token}"},
        "tools": {"resources": False, "prompts": False},
    }
    cfg_path.write_text(yaml.safe_dump(cfg, sort_keys=False))
    print("Added mcp_servers.affine -> http://localhost:3000/mcp")
    PY
    systemctl --user restart hermes-gateway
    echo "Restarted hermes-gateway. In 'hermes chat' you can also run /reload-mcp."

  # Interactive chat. Ask "Which MCP tools are available?" to confirm the
  # AFFiNE tools loaded.
  chat: |
    hermes chat "$@"

  # Follow gateway logs.
  logs: |
    journalctl --user -u hermes-gateway -f
