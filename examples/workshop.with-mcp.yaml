# Example workshop: Hermes Agent + an MCP server (affine-mcp-server).
#
# Pairs the hermes-agent SDK with the affine-mcp-server SDK in ONE workshop and
# wires Hermes' `mcp-server` tunnel plug to the AFFiNE server's `affine-mcp-http`
# slot. Hermes then discovers the AFFiNE tools (read/author docs) via the
# `mcp_servers:` block in ~/.hermes/config.yaml.
#
# The affine-mcp-server SDK runs the HTTP server itself (a managed systemd user
# service) and generates the bearer token on first launch — this workshop does
# NOT start it. Hermes is a pure consumer: `enable-affine` just copies that
# token to Hermes' secrets and points config.yaml at http://localhost:3000/mcp.
#
# This is a reference file; it is NOT auto-loaded (its name isn't
# `workshop.yaml`). Copy it into a project as `workshop.yaml` to use it.
#
# Transport choice: this uses HTTP because it works for the long-running gateway
# daemon. For a single workshop, stdio is simpler still (no listener, no bearer
# token) — see the README "MCP servers" section.
#
# Quickstart once launched (workshop name is `hermes`):
#   workshop launch --verbose
#   workshop run hermes affine-login    # authenticate the AFFiNE server (one-time)
#   workshop run hermes enable-affine   # share its token with Hermes + wire config
#   workshop run hermes chat

name: hermes
base: ubuntu@24.04

sdks:
  - name: hermes-agent
    channel: latest/stable
    # For local SDK development, swap to the try build instead:
    # name: try-hermes-agent  (no channel)

  - name: affine-mcp-server
    channel: latest/stable

  # The LLM backend on the host (Ollama-compatible). Drop this block and the
  # llm-backend connection below to use a remote provider instead — see
  # examples/workshop.remote-openai.yaml.
  - name: system
    slots:
      llm-backend:
        interface: tunnel
        endpoint: localhost:11434

connections:
  # Wire Hermes' outbound LLM plug to the host Ollama (see examples/workshop.yaml).
  - plug: hermes-agent:llm-backend
    slot: system:llm-backend

  # Wire Hermes' MCP plug to the AFFiNE server's HTTP slot. The affine-mcp-server
  # SDK serves :3000 on its own, so inside this workshop it is reachable at
  # http://localhost:3000/mcp — which is what `enable-affine` writes into
  # ~/.hermes/config.yaml. Note the plug is referenced by the SDK's real name
  # `hermes-agent`, not `try-hermes-agent` (`try-` is reserved in refs).
  - plug: hermes-agent:mcp-server
    slot: affine-mcp-server:affine-mcp-http

actions:
  # One-time: authenticate the AFFiNE server to your AFFiNE instance, then
  # restart its HTTP service so it picks up the credentials. (Alternatively set
  # AFFINE_BASE_URL / AFFINE_API_TOKEN in ~/.config/affine-mcp/.env.)
  affine-login: |
    affine-mcp login
    systemctl --user restart affine-mcp-http
    affine-mcp status

  # Share the AFFiNE server's bearer token with Hermes and wire config.yaml.
  # The token is generated by the affine-mcp-server SDK and lives in its config
  # mount; we copy it into Hermes' secrets and reference it from config.yaml as
  # ${AFFINE_MCP_HTTP_TOKEN} — so no secret is typed on the CLI or embedded
  # literally in config.yaml. Both SDKs share this one workshop's home, so the
  # file is readable here. (Cross-workshop, provision the same token into both
  # secret stores instead — see the README "MCP servers" section.)
  enable-affine: |
    src=~/.config/affine-mcp/.env
    token=$(sed -n 's/^AFFINE_MCP_HTTP_TOKEN=//p' "$src" 2>/dev/null | head -1)
    if [ -z "$token" ]; then
      echo "No AFFINE_MCP_HTTP_TOKEN in $src — is the affine-mcp-server SDK launched?" >&2
      exit 1
    fi
    sed -i '/^AFFINE_MCP_HTTP_TOKEN=/d' ~/.hermes/secrets/.env 2>/dev/null || true
    printf 'AFFINE_MCP_HTTP_TOKEN=%s\n' "$token" >> ~/.hermes/secrets/.env
    ~/hermes-agent/venv/bin/python - <<'PY'
    import yaml, pathlib
    cfg_path = pathlib.Path.home() / ".hermes" / "config.yaml"
    cfg = yaml.safe_load(cfg_path.read_text()) or {}
    servers = cfg.setdefault("mcp_servers", {})
    servers["affine"] = {
        "url": "http://localhost:3000/mcp",
        "headers": {"Authorization": "Bearer ${AFFINE_MCP_HTTP_TOKEN}"},
        "tools": {"resources": False, "prompts": False},
    }
    cfg_path.write_text(yaml.safe_dump(cfg, sort_keys=False))
    print("Configured mcp_servers.affine -> http://localhost:3000/mcp")
    PY
    systemctl --user restart hermes-gateway
    echo "Restarted hermes-gateway. In 'hermes chat' you can also run /reload-mcp."

  # Interactive chat. Ask "Which MCP tools are available?" to confirm the
  # AFFiNE tools loaded.
  chat: |
    hermes chat "$@"

  # Follow gateway logs.
  logs: |
    journalctl --user -u hermes-gateway -f
