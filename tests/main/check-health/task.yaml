summary: check-health flags a missing model.default (launch-free)

# A full `workshop launch` cannot assert this in CI: hooks/check-health only
# reaches `okay` once model.default is set AND the llm-backend/gateway are up,
# none of which exist in a CI sandbox — so launch rolls back ("not healthy
# after multiple checks") regardless of whether health is error or waiting.
# We therefore test the decision logic directly: the model.default extraction
# that governs the health verdict, kept identical to the awk in
# hooks/check-health. (Run dir is the task's own directory.)

execute: |
    bash ../../test-model-check.sh
