summary: check-health fails explicitly when no model is configured

# The generated config.yaml leaves model.default empty, so a fresh launch must
# report an SDK health error (naming the missing model) rather than a silent
# "okay". Setting the model and refreshing must clear that error.
#
# Note: launch is slow here — the SDK clones hermes-agent and builds the venv,
# Node 22, and Playwright Chromium before check-health runs.

prepare: |
  envsubst '${BASE}' <workshop.yaml.in >workshop.yaml
  workshop launch

restore: |
  workshop remove || true

execute: |
  # No model set -> health error mentioning model.default.
  workshop info test-hermes | MATCH "model.default"

  # Set a model and refresh.
  workshop exec test-hermes -- sed -i 's/^  default: ""/  default: qwen3.6:35b/' ~/.hermes/config.yaml
  workshop refresh

  # The "model.default is not set" error must be gone now.
  workshop info test-hermes | NOMATCH "model.default is not set"

debug: |
  workshop tasks
  workshop info test-hermes || true
