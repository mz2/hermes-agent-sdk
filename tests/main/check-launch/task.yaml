summary: Launch workshop and validate hermes + gateway service wiring

prepare: |
  envsubst '${BASE}' <workshop.yaml.in >workshop.yaml
  workshop launch

restore: |
  workshop remove || true

execute: |
  echo "[1/3] hermes runs inside the workshop"
  workshop exec -- hermes --version | MATCH '^Hermes Agent v'

  echo "[2/3] gateway unit is installed and enabled"
  workshop exec -- hermes gateway status | MATCH 'Loaded: loaded|enabled; preset: enabled|✓ Systemd linger is enabled'

  echo "[3/3] gateway can be started"
  workshop exec -- hermes gateway start
  workshop exec -- hermes gateway status | MATCH 'Active: active \(running\)|✓ User gateway service is running'

  echo "ALL PASS"

debug: |
  workshop exec -- hermes --version || true
  workshop exec -- hermes gateway status || true
  workshop exec -- systemctl --user status hermes-gateway.service --no-pager --lines=40 || true
