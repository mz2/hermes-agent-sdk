name: Build and Upload SDK

on:
  push:
    branches:
      - latest
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name (e.g., latest)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    uses: canonical/sdkcraft-actions/.github/workflows/upload.yml@main
    with:
      # Both arches publish to the store from the self-hosted arm64 runner.
      # SDK parts are plugin: nil, so sdkcraft pack just bundles metadata
      # + hooks + services — the runner cross-packs amd64 from arm64
      # without trouble. `runs-on` is a single JSON array used for every
      # matrix entry; to route arches to different runners, split this
      # into two jobs with separate `runs-on`.
      runs-on: '["self-hosted","arm64"]'
      platforms: '["amd64","arm64"]'
      risk: "stable"
    secrets:
      SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS_STAGING }}
