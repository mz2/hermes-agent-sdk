name: Build SDK

on:
  pull_request:
    branches:
      - latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # amd64 — Canonical's default self-hosted x64 pool. The reusable workflow
  # handles LXD + sdkcraft installs via sudo.
  build-amd64:
    uses: canonical/sdkcraft-actions/.github/workflows/build.yml@main

  # arm64 — self-hosted ozymandias runner. No sudo on the runner; LXD and
  # sdkcraft are pre-installed on the host (see upload.yml for the one-time
  # host-setup commands). PR validation only — packs but doesn't upload.
  build-arm64:
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Pack SDK for arm64
        run: sdkcraft --verbose pack --build-for arm64
